<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knomee – Generating Your Profile</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Poppins', sans-serif;
    background: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    background: #1E1145;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 56px;
    flex-shrink: 0;
    position: relative;
  }
  nav .brand { display: flex; align-items: center; }
  nav .org {
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
  nav .hamburger {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    width: 32px;
    height: 32px;
    cursor: pointer;
  }
  nav .hamburger span { display: block; height: 2px; background: #fff; border-radius: 2px; width: 100%; }

  /* MAIN */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 24px 40px;
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── SECONDARY PROGRESS (small spinner + global %) ── */
  .progress-strip {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 30px;
  }
  .mini-ring { position: relative; width: 46px; height: 46px; flex-shrink: 0; }
  .mini-ring svg { transform: rotate(-90deg); }
  .mini-track { fill: none; stroke: #E8E4F0; stroke-width: 5; }
  .mini-fill {
    fill: none;
    stroke: url(#miniGrad);
    stroke-width: 5;
    stroke-linecap: round;
    stroke-dasharray: 119.4;  /* 2πr, r=19 */
    stroke-dashoffset: 119.4;
    transition: stroke-dashoffset 0.3s linear;
  }
  /* the rotating spinner accent, carried over from the loading ring */
  .mini-spin {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: rgba(124,58,237,0.55);
    animation: spin 0.9s linear infinite;
  }
  body.complete .mini-spin { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .progress-meta { display: flex; flex-direction: column; line-height: 1.3; }
  .progress-meta .pm-top {
    font-size: 13px;
    font-weight: 600;
    color: #1E1145;
  }
  .progress-meta .pm-sub {
    font-size: 12px;
    font-weight: 500;
    color: #9b9bb0;
  }

  /* ── HERO EDUCATIONAL CARD ── */
  .edu-card {
    width: 100%;
    background: #fff;
    border: 1px solid #ECE9F4;
    border-radius: 22px;
    box-shadow: 0 10px 40px rgba(30, 17, 69, 0.07);
    padding: 40px 44px;
    position: relative;
    overflow: hidden;
    min-height: 340px;
  }
  /* top accent strip that fills as the current topic "loads" */
  .edu-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: #ECE9F4;
  }
  .edu-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    height: 5px;
    width: 0%;
    background: linear-gradient(90deg, #1E1145, #7C3AED);
  }
  .edu-card.filling::after { animation: topfill var(--step-dur, 4200ms) linear forwards; }
  .edu-card.done-fill::after { width: 100%; }
  @keyframes topfill { from { width: 0%; } to { width: 100%; } }

  .edu-inner { transition: opacity 0.35s ease, transform 0.35s ease; }
  .edu-inner.swapping { opacity: 0; transform: translateY(8px); }

  .edu-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #7C3AED;
    margin-bottom: 18px;
  }
  .edu-head {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .edu-emoji { font-size: 40px; line-height: 1; }
  .edu-title {
    font-size: 26px;
    font-weight: 700;
    color: #1E1145;
  }
  .edu-what {
    font-size: 16px;
    font-weight: 400;
    color: #4a4a5e;
    line-height: 1.8;
    margin-bottom: 26px;
  }
  .edu-why {
    background: #F6F3FD;
    border-radius: 14px;
    padding: 20px 22px;
    border-left: 4px solid #7C3AED;
  }
  .edu-why-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #7C3AED;
    margin-bottom: 10px;
  }
  .edu-why-text {
    font-size: 15px;
    font-weight: 400;
    color: #3a2a5e;
    line-height: 1.8;
  }

  /* ── PER-ITEM DOTS (de-emphasized) ── */
  .dots {
    display: flex;
    gap: 10px;
    margin-top: 26px;
    justify-content: center;
  }
  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #E1DCEF;
    transition: background 0.3s, transform 0.3s, width 0.3s, border-radius 0.3s;
  }
  .dot.active {
    width: 26px;
    border-radius: 99px;
    background: #7C3AED;
  }
  .dot.done { background: #1E1145; }

  /* ── FINAL CTA ── */
  .final-msg {
    margin-top: 34px;
    text-align: center;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.6s, transform 0.6s;
    pointer-events: none;
  }
  .final-msg.visible { opacity: 1; transform: translateY(0); pointer-events: all; }
  .final-msg p { font-size: 15px; font-weight: 400; color: #555; margin-bottom: 20px; }

  .btn-continue {
    display: inline-block;
    background: #1E1145;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 16px 56px;
    border-radius: 99px;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-continue:hover { background: #2d1b69; transform: translateY(-1px); }

  /* discreet skip link */
  .skip-link {
    position: fixed;
    bottom: 18px;
    right: 22px;
    font-size: 12px;
    font-weight: 500;
    color: #bbb;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    transition: color 0.2s;
  }
  .skip-link:hover { color: #7C3AED; }
  body.complete .skip-link { display: none; }

  @media (max-width: 640px) {
    nav { padding: 0 16px; }
    nav .brand svg { height: 14px; }
    nav .org { font-size: 11px; letter-spacing: 0.06em; }
    main { padding: 28px 18px 36px; }
    .edu-card { padding: 30px 24px; min-height: 0; }
    .edu-title { font-size: 22px; }
    .edu-emoji { font-size: 34px; }
    .edu-what { font-size: 15px; }
  }
</style>
</head>
<body>

<!-- NAV -->

<main>

  <!-- SECONDARY PROGRESS: small spinner + global % -->
  <div class="progress-strip">
    <div class="mini-ring">
      <svg width="46" height="46" viewBox="0 0 46 46">
        <defs>
          <linearGradient id="miniGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E1145"/>
            <stop offset="100%" stop-color="#7C3AED"/>
          </linearGradient>
        </defs>
        <circle class="mini-track" cx="23" cy="23" r="19"/>
        <circle class="mini-fill" id="miniFill" cx="23" cy="23" r="19"/>
      </svg>
      <div class="mini-spin"></div>
    </div>
    <div class="progress-meta">
      <span class="pm-top" id="pmTop">Building your Personal Insights</span>
      <span class="pm-sub" id="pmSub">0% &middot; Step 1 of 6</span>
    </div>
  </div>

  <!-- HERO EDUCATIONAL CARD -->
  <div class="edu-card" id="eduCard">
    <div class="edu-inner" id="eduInner">
      <div class="edu-eyebrow" id="eduEyebrow">Now exploring</div>
      <div class="edu-head">
        <span class="edu-emoji" id="eduEmoji">😊</span>
        <span class="edu-title" id="eduTitle">Your Financial Joy</span>
      </div>
      <p class="edu-what" id="eduWhat"></p>
      <div class="edu-why">
        <div class="edu-why-label">Why this matters</div>
        <p class="edu-why-text" id="eduWhy"></p>
      </div>
    </div>
  </div>

  <!-- PER-ITEM DOTS -->
  <div class="dots" id="dots"></div>

  <!-- FINAL CTA -->
  <div class="final-msg" id="finalMsg">
    <p>That's the thinking behind your Personal Insights. Ready to see them?</p>
    <button class="btn-continue" onclick="window.location.href='index.html'">Continue</button>
  </div>

  <button class="skip-link" onclick="skipAhead()">Skip &rarr;</button>
</main>

<script>
  const TOTAL_DURATION = 6000;

  // Education-first content. Each topic teaches: what we're doing, what it is,
  // and why it matters — tied back to the Welcome promise
  // ("Wealth is about experiencing life fully", Personal Insights, 3 money questions).
  const topics = [
    {
      emoji: "😊",
      eyebrow: "Now exploring · Financial Joy",
      title: "Your Financial Joy",
      what: "What makes money feel worth it to you — the experiences and moments that matter most.",
      why: "Knowing your joy lets your plan serve your life, not the other way around.",
    },
    {
      emoji: "🛡️",
      eyebrow: "Now exploring · Confidence",
      title: "Your Confidence",
      what: "How secure and in-control you feel about your financial decisions.",
      why: "It helps you and your advisor focus on what will give you real peace of mind.",
    },
    {
      emoji: "🌤️",
      eyebrow: "Now exploring · Outlook",
      title: "Your Outlook",
      what: "How you feel about the road ahead — optimistic, cautious, or somewhere in between.",
      why: "Naming it is the first step to turning worry into a plan you can act on.",
    },
    {
      emoji: "🔭",
      eyebrow: "Now exploring · Vision of the Future",
      title: "Your Vision of the Future",
      what: "The life you’re working toward — where you want to be and how you want to spend your days.",
      why: "A clear vision is the foundation of every good plan.",
    },
    {
      emoji: "🎯",
      eyebrow: "Now exploring · Goals",
      title: "Your Goals",
      what: "The concrete milestones that move you toward your vision.",
      why: "This is how dreams become plans — and priorities you and your advisor build around.",
    },
    {
      emoji: "⚡",
      eyebrow: "Final step · Financial Profile",
      title: "Your Financial Profile",
      what: "Bringing it all together into one personalized summary that’s uniquely yours.",
      why: "Your Personal Insights, plus the 3 most important money questions to explore next.",
    },
  ];

  const N = topics.length;
  const stepDuration = TOTAL_DURATION / N;
  document.documentElement.style.setProperty('--step-dur', stepDuration + 'ms');

  const CIRCUMFERENCE = 119.4;
  const miniFill = document.getElementById('miniFill');
  const pmTop = document.getElementById('pmTop');
  const pmSub = document.getElementById('pmSub');
  const eduCard = document.getElementById('eduCard');
  const eduInner = document.getElementById('eduInner');
  const eduEyebrow = document.getElementById('eduEyebrow');
  const eduEmoji = document.getElementById('eduEmoji');
  const eduTitle = document.getElementById('eduTitle');
  const eduWhat = document.getElementById('eduWhat');
  const eduWhy = document.getElementById('eduWhy');
  const finalMsg = document.getElementById('finalMsg');
  const dotsWrap = document.getElementById('dots');

  // build dots
  const dots = [];
  for (let i = 0; i < N; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    dotsWrap.appendChild(d);
    dots.push(d);
  }

  function renderTopic(i) {
    eduEyebrow.textContent = topics[i].eyebrow;
    eduEmoji.textContent = topics[i].emoji;
    eduTitle.textContent = topics[i].title;
    eduWhat.textContent = topics[i].what;
    eduWhy.textContent = topics[i].why;
  }

  function setActiveTopic(i, fade) {
    // restart the top accent fill animation
    eduCard.classList.remove('filling');
    void eduCard.offsetWidth;
    eduCard.classList.add('filling');

    // dots
    dots.forEach((d, j) => {
      d.classList.toggle('done', j < i);
      d.classList.toggle('active', j === i);
    });

    pmSub.textContent = pmSub.dataset.pct + '% · Step ' + (i + 1) + ' of ' + N;

    if (fade) {
      eduInner.classList.add('swapping');
      setTimeout(() => {
        renderTopic(i);
        eduInner.classList.remove('swapping');
      }, 350);
    } else {
      renderTopic(i);
    }
  }

  let startTime = null;
  let activeIdx = 0;
  let skipRequested = false;

  function skipAhead() { skipRequested = true; }
  document.addEventListener('keydown', e => { if (e.key === 'ArrowRight') skipAhead(); });

  pmSub.dataset.pct = '0';
  renderTopic(0);
  setActiveTopic(0, false);

  function tick(ts) {
    if (!startTime) startTime = ts;
    if (skipRequested) startTime = ts - TOTAL_DURATION;
    const elapsed = ts - startTime;
    const rawPct = Math.min(elapsed / TOTAL_DURATION, 1);
    const displayPct = Math.round(rawPct * 100);

    miniFill.style.strokeDashoffset = CIRCUMFERENCE * (1 - rawPct);
    pmSub.dataset.pct = displayPct;
    pmSub.textContent = displayPct + '% · Step ' + (activeIdx + 1) + ' of ' + N;

    const targetIdx = Math.min(Math.floor(elapsed / stepDuration), N - 1);

    if (targetIdx > activeIdx) {
      activeIdx = targetIdx;
      setActiveTopic(activeIdx, true);
    }

    if (rawPct < 1) {
      requestAnimationFrame(tick);
    } else {
      dots.forEach(d => { d.classList.remove('active'); d.classList.add('done'); });
      eduCard.classList.remove('filling');
      eduCard.classList.add('done-fill');
      pmTop.textContent = 'Your Personal Insights are ready';
      pmSub.textContent = '100% · Complete';
      document.body.classList.add('complete');
      finalMsg.classList.add('visible');
    }
  }

  requestAnimationFrame(tick);
</script>
</body>
</html>
